version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: radiix_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-radiix_tracker}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${DB_USERNAME:-radiix_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-radiix_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - radiix_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: radiix_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - radiix_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: radiix_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - radiix_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-radiix_tracker}
      - DB_USERNAME=${DB_USERNAME:-radiix_user}
      - DB_PASSWORD=${DB_PASSWORD:-radiix_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: radiix_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - radiix_network
    depends_on:
      - app

  # Node.js for Vite (Hot Module Replacement in development)
  # Uncomment this service if you want to run Vite inside Docker
  # Note: For development, it's often easier to run 'npm run dev' on your host machine
  # node:
  #   image: node:20-alpine
  #   container_name: radiix_node
  #   restart: unless-stopped
  #   working_dir: /var/www/html
  #   volumes:
  #     - ./:/var/www/html
  #     - node_modules:/var/www/html/node_modules
  #   networks:
  #     - radiix_network
  #   ports:
  #     - "5173:5173"
  #   command: sh -c "npm install && npm run dev"
  #   environment:
  #     - VITE_APP_NAME="${APP_NAME:-Radiix Infiniteii Tracker}"
  #     - VITE_DEV_HOST=localhost
  #   profiles:
  #     - dev

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  node_modules:
    driver: local

networks:
  radiix_network:
    driver: bridge
